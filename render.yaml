services:
  - type: web
    name: grocery-app
    env: python
    plan: free
    rootDir: grocery_project
    buildCommand: pip install -r requirements-prod.txt && python manage.py collectstatic --noinput
    releaseCommand: python manage.py migrate --noinput
    startCommand: gunicorn grocery.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DJANGO_SETTINGS_MODULE
        value: grocery.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*.onrender.com"

databases:
  - name: grocery-db
    plan: free
    region: ohio
